<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL QUEST - ADMIN v1.5</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2ecc71; --bg: #0d1117; --panel: #161b22; --border: #30363d; --text: #c9d1d9; --danger: #e74c3c; --warning: #f1c40f; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        #app { width: 360px; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative; }
        .screen { display: none; text-align: center; }
        .active { display: block; }
        
        /* Estilo Admin */
        #admin-panel { width: 90vw; max-width: 800px; background: var(--panel); border: 1px solid var(--primary); padding: 20px; display: none; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.85rem; }
        th, td { border: 1px solid var(--border); padding: 10px; text-align: left; }
        .status-tag { padding: 4px 8px; border-radius: 4px; font-weight: bold; color: #000; font-size: 0.7rem; }
        
        /* Elementos de Jogo */
        #game-canvas { width: 320px; height: 320px; border: 1px solid var(--border); background: #000; position: relative; margin: 10px auto; overflow: hidden; display: none; }
        #target { width: 55px; height: 55px; border-radius: 50%; position: absolute; cursor: pointer; display: none; border: 2px solid rgba(255,255,255,0.2); }
        .btn { background: var(--primary); color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 4px; text-transform: uppercase; margin-top: 10px; }
        input { background: #000; border: 1px solid var(--border); color: var(--primary); width: 90%; padding: 12px; margin-bottom: 10px; border-radius: 4px; }
        #admin-trigger { position: fixed; bottom: 10px; right: 10px; opacity: 0.3; font-size: 0.6rem; cursor: pointer; color: var(--text); }
    </style>
</head>
<body>

<div id="app">
    <div id="screen-login" class="screen active">
        <h2 style="color:var(--primary)">Neural Quest</h2>
        <p style="font-size:0.8rem">Terminal de Prontidão Diária</p>
        <input type="text" id="uName" placeholder="Nome do Operador">
        <input type="text" id="uID" placeholder="Matrícula">
        <button class="btn" onclick="showIntro()">Acessar Teste</button>
    </div>

    <div id="screen-intro" class="screen">
        <h2 id="proto-title">Instruções</h2>
        <div id="proto-desc" style="padding:15px; background:#000; border-left:4px solid var(--primary); text-align:left; font-size:0.9rem; margin:15px 0;"></div>
        <button class="btn" onclick="startCurrentBlock()">Iniciar Protocolo</button>
    </div>

    <div id="game-container" style="display:none;">
        <div style="display:flex; justify-content:space-between; font-size:0.7rem; margin-bottom:5px;">
            <span id="label-mode">MODO</span>
            <span id="label-count">0/16</span>
        </div>
        <div id="game-canvas"><div id="target"></div></div>
    </div>

    <div id="screen-result" class="screen">
        <h2>Avaliação Concluída</h2>
        <div style="height:150px"><canvas id="perfChart"></canvas></div>
        <div id="final-score" style="margin-top:10px; font-weight:bold; color:var(--primary);"></div>
        <button class="btn" onclick="location.reload()">Sair do Terminal</button>
    </div>
</div>

<div id="admin-panel">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 style="color:var(--primary); margin:0;">Dashboard de Supervisão (RH)</h2>
        <button onclick="toggleAdmin()" style="background:var(--danger); border:none; color:#fff; padding:5px 10px; cursor:pointer; border-radius:4px;">Fechar</button>
    </div>
    <div style="margin-top:10px;">
        <button onclick="clearLogs()" style="background:none; color:gray; border:1px solid gray; cursor:pointer; font-size:0.7rem;">Limpar Histórico</button>
    </div>
    <table>
        <thead>
            <tr>
                <th>Operador (ID)</th>
                <th>Data/Hora</th>
                <th>Score Médio</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="admin-table-body">
            </tbody>
    </table>
</div>

<div id="admin-trigger" onclick="toggleAdmin()">MODO SUPERVISOR [ADMIN]</div>

<script>
    let operator = { name: '', id: '' };
    let stage = 0, trial = 0, results = [], startTime, isActive = false, blinkInterval;
    
    const protocols = [
        { name: "REAÇÃO", color: "#2ecc71", desc: "Clique rápido no VERDE." },
        { name: "BUSCA", color: "#3498db", desc: "Localize o alvo azul na tela." },
        { name: "FILTRO", color: "#2ecc71", desc: "SÓ VERDE. Ignore o vermelho." },
        { name: "RITMO", color: "#9b59b6", desc: "Clique na 3ª piscada (Roxo)." }
    ];

    // --- LÓGICA DE ADMIN ---
    function toggleAdmin() {
        const app = document.getElementById('app');
        const admin = document.getElementById('admin-panel');
        if(admin.style.display === 'none' || admin.style.display === '') {
            app.style.display = 'none';
            admin.style.display = 'block';
            loadAdminData();
        } else {
            app.style.display = 'block';
            admin.style.display = 'none';
        }
    }

    function loadAdminData() {
        const logs = JSON.parse(localStorage.getItem('nq_global_logs') || "[]");
        const tbody = document.getElementById('admin-table-body');
        tbody.innerHTML = "";
        
        logs.reverse().forEach(log => {
            let status = "APTO";
            let color = "var(--primary)";
            if(log.score > 450) { status = "ATENÇÃO"; color = "var(--warning)"; }
            if(log.score > 600) { status = "RISCO"; color = "var(--danger)"; }

            tbody.innerHTML += `
                <tr>
                    <td>${log.name} (${log.id})</td>
                    <td>${log.date}</td>
                    <td>${log.score.toFixed(0)}ms</td>
                    <td><span class="status-tag" style="background:${color}">${status}</span></td>
                </tr>
            `;
        });
    }

    function saveGlobalLog(score) {
        const logs = JSON.parse(localStorage.getItem('nq_global_logs') || "[]");
        logs.push({
            name: operator.name,
            id: operator.id,
            score: score,
            date: new Date().toLocaleString('pt-BR')
        });
        localStorage.setItem('nq_global_logs', JSON.stringify(logs));
    }

    function clearLogs() {
        if(confirm("Deseja apagar todos os registros do RH?")) {
            localStorage.removeItem('nq_global_logs');
            loadAdminData();
        }
    }

    // --- LÓGICA DO JOGO (v1.4 simplificada para o Admin) ---
    function showIntro() {
        operator.name = document.getElementById('uName').value;
        operator.id = document.getElementById('uID').value;
        if(!operator.name || !operator.id) return alert("Identifique-se.");
        document.getElementById('screen-login').classList.remove('active');
        updateIntro();
    }

    function updateIntro() {
        document.getElementById('screen-intro').classList.add('active');
        document.getElementById('proto-title').innerText = protocols[stage].name;
        document.getElementById('proto-desc').innerText = protocols[stage].desc;
    }

    function startCurrentBlock() {
        document.getElementById('screen-intro').classList.remove('active');
        document.getElementById('game-container').style.display = 'block';
        document.getElementById('game-canvas').style.display = 'block';
        nextTrial();
    }

    function nextTrial() {
        if(trial >= 4) {
            stage++; trial = 0;
            document.getElementById('game-container').style.display = 'none';
            if(stage >= 4) return finalize();
            updateIntro();
            return;
        }
        const t = document.getElementById('target');
        t.style.display = 'none';
        isActive = false; clearInterval(blinkInterval);
        document.getElementById('label-mode').innerText = protocols[stage].name;
        document.getElementById('label-count').innerText = `${(stage*4)+trial+1}/16`;
        setTimeout(spawn, 1000 + Math.random()*1500);
    }

    function spawn() {
        const t = document.getElementById('target');
        t.style.top = (stage === 1 ? 20 + Math.random()*240 : 130) + "px";
        t.style.left = (stage === 1 ? 20 + Math.random()*240 : 130) + "px";
        
        if(stage === 2) {
            let isRed = Math.random() > 0.4;
            t.style.backgroundColor = isRed ? "#e74c3c" : "#2ecc71";
            t.style.display = 'block';
            startTime = performance.now(); isActive = true;
            if(isRed) setTimeout(() => { if(isActive) register(0); }, 1200);
        } else if(stage === 3) {
            t.style.backgroundColor = "#111"; t.style.display = 'block';
            let b = 0; let spd = 400 + Math.random()*500;
            blinkInterval = setInterval(() => {
                b++;
                if(b < 3) { t.style.backgroundColor="#333"; setTimeout(()=>t.style.backgroundColor="#111",150); }
                else { t.style.backgroundColor="#9b59b6"; startTime=performance.now(); isActive=true; clearInterval(blinkInterval); }
            }, spd);
        } else {
            t.style.backgroundColor = protocols[stage].color; t.style.display = 'block';
            startTime = performance.now(); isActive = true;
        }
    }

    document.getElementById('target').onclick = () => {
        if(!isActive) return;
        const diff = performance.now() - startTime;
        if(document.getElementById('target').style.backgroundColor === "rgb(231, 76, 60)") return register(1500);
        register(diff);
    };

    function register(ms) {
        isActive = false; results.push(ms); trial++;
        nextTrial();
    }

    function finalize() {
        document.getElementById('game-container').style.display = 'none';
        document.getElementById('screen-result').classList.add('active');
        const media = results.reduce((a,b)=>a+b)/16;
        document.getElementById('final-score').innerHTML = `SCORE: ${media.toFixed(0)}ms`;
        saveGlobalLog(media);
        plotar();
    }

    function plotar() {
        const ctx = document.getElementById('perfChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['REAC', 'BUSC', 'FILT', 'RITM'],
                datasets: [{ data: [
                    results.slice(0,4).reduce((a,b)=>a+b)/4,
                    results.slice(4,8).reduce((a,b)=>a+b)/4,
                    results.slice(8,12).reduce((a,b)=>a+b)/4,
                    results.slice(12,16).reduce((a,b)=>a+b)/4
                ], backgroundColor: ['#2ecc71', '#3498db', '#f1c40f', '#9b59b6'] }]
            },
            options: { maintainAspectRatio: false, plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true,ticks:{color:'#2ecc71'}}}}
        });
    }
</script>
</body>
</html>
