<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL QUEST - INDUSTRIAL GATE v1.2</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2ecc71; --bg: #0d1117; --panel: #161b22; --border: #30363d; }
        body { background: var(--bg); color: var(--primary); font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; }
        
        #main-gate { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 30px; width: 320px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-transform: uppercase; letter-spacing: 2px; font-size: 1.2rem; margin-top: 0; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        
        input { background: #000; border: 1px solid var(--border); color: var(--primary); width: 90%; padding: 12px; margin: 10px 0; border-radius: 4px; font-family: 'Courier New'; }
        
        #game-area { display: none; position: relative; width: 340px; height: 340px; border: 2px solid var(--primary); border-radius: 4px; background: rgba(0,0,0,0.4); margin-top: 20px; overflow: hidden; }
        #target { width: 50px; height: 50px; border-radius: 4px; position: absolute; cursor: pointer; display: none; box-shadow: 0 0 15px currentColor; }
        
        .btn-action { background: var(--primary); color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 4px; text-transform: uppercase; margin-top: 10px; }
        #chart-area { width: 340px; height: 140px; margin-top: 20px; display: none; }
        #hud { font-size: 0.75rem; margin-top: 10px; color: #8b949e; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="main-gate">
        <h2>Identificação Operacional</h2>
        <input type="text" id="userName" placeholder="NOME DO OPERADOR">
        <input type="text" id="userID" placeholder="MATRÍCULA / ID">
        <button class="btn-action" onclick="autorizar()">AUTORIZAR ACESSO</button>
    </div>

    <div id="game-area">
        <div id="msg" style="padding: 40px; text-align: center; margin-top: 80px;">SISTEMA PRONTO</div>
        <div id="target"></div>
    </div>

    <div id="chart-area"><canvas id="perfChart"></canvas></div>
    <div id="hud"></div>

    <script>
        let operator = { name: '', id: '' };
        let results = [], stage = 0, trial = 0, startTime, isActive = false;
        const protos = [
            { name: "REAÇÃO", color: "#2ecc71" }, { name: "BUSCA", color: "#3498db" },
            { name: "FILTRO", color: "#f1c40f" }, { name: "RITMO", color: "#9b59b6" }
        ];

        function autorizar() {
            operator.name = document.getElementById('userName').value;
            operator.id = document.getElementById('userID').value;
            if(!operator.name || !operator.id) return alert("CREDENCIAIS OBRIGATÓRIAS");
            
            document.getElementById('main-gate').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            iniciarBateria();
        }

        function iniciarBateria() {
            stage = 0; trial = 0; results = [];
            proximo();
        }

        function proximo() {
            if(stage >= 4) return finalizar();
            const p = protos[stage];
            document.getElementById('msg').innerHTML = `PROTOCOLO: ${p.name}<br><small>CICLO ${trial+1}/4</small>`;
            
            setTimeout(() => {
                document.getElementById('msg').innerHTML = "";
                lancarAlvo(p);
            }, 1200);
        }

        function lancarAlvo(p) {
            const t = document.getElementById('target');
            t.style.display = 'none';
            
            setTimeout(() => {
                t.style.top = (stage === 1 ? Math.random()*280 : 145) + "px";
                t.style.left = (stage === 1 ? Math.random()*280 : 145) + "px";
                
                let isRed = (stage === 2 && Math.random() > 0.5);
                t.style.backgroundColor = isRed ? "#e74c3c" : p.color;
                t.style.display = 'block';
                startTime = performance.now();
                isActive = true;

                if(isRed) setTimeout(() => { if(isActive) registrar(0); }, 1000);
            }, 800 + Math.random()*1200);
        }

        document.getElementById('target').onclick = () => {
            if(!isActive) return;
            const diff = performance.now() - startTime;
            if(document.getElementById('target').style.backgroundColor === "rgb(231, 76, 60)") return registrar(1000);
            registrar(diff);
        };

        function registrar(ms) {
            isActive = false; results.push(ms); trial++;
            if(trial >= 4) { stage++; trial = 0; }
            proximo();
        }

        function finalizar() {
            document.getElementById('game-area').style.display = 'none';
            document.getElementById('chart-area').style.display = 'block';
            const media = results.reduce((a,b)=>a+b)/16;
            document.getElementById('hud').innerHTML = `OPERADOR: ${operator.name} | SCORE: ${media.toFixed(0)}MS`;
            plotar();
        }

        function plotar() {
            const ctx = document.getElementById('perfChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['REAC', 'BUSC', 'FILT', 'RITM'],
                    datasets: [{ data: [
                        results.slice(0,4).reduce((a,b)=>a+b)/4,
                        results.slice(4,8).reduce((a,b)=>a+b)/4,
                        results.slice(8,12).reduce((a,b)=>a+b)/4,
                        results.slice(12,16).reduce((a,b)=>a+b)/4
                    ], backgroundColor: ['#2ecc71', '#3498db', '#f1c40f', '#9b59b6'] }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }
    </script>
</body>
</html>
