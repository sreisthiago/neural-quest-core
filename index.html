<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL QUEST - BASELINE ENGINE v0.3</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; user-select: none; }
        #display { border: 2px solid #00ff41; padding: 30px; border-radius: 10px; box-shadow: 0 0 20px #00ff41; text-align: center; width: 300px; transition: 0.3s; }
        #stimulus { width: 120px; height: 120px; border-radius: 50%; background: #111; margin: 20px auto; border: 2px solid #333; display: none; cursor: pointer; }
        .btn-action { background: none; border: 1px solid #00ff41; color: #00ff41; padding: 15px 30px; cursor: pointer; margin-top: 20px; font-weight: bold; width: 100%; text-transform: uppercase; }
        #status-bar { font-size: 0.7rem; margin-top: 20px; color: #008f11; text-align: center; line-height: 1.5; }
        .alerta { border-color: #ff0000 !important; box-shadow: 0 0 20px #ff0000 !important; color: #ff0000 !important; }
        .calibrando { border-color: #00e5ff !important; box-shadow: 0 0 20px #00e5ff !important; color: #00e5ff !important; }
    </style>
</head>
<body>
    <div id="display">
        <h2 id="title">Neural Quest</h2>
        <div id="stimulus"></div>
        <div id="result">AGUARDANDO...</div>
        <button id="startBtn" class="btn-action" onclick="prepararTeste()">INICIAR QUEST</button>
    </div>
    <div id="status-bar">CARREGANDO BASELINE...</div>

    <script>
        let startTime, waitTimeout, sensorAtivo = false;
        const stim = document.getElementById('stimulus');
        const res = document.getElementById('result');
        const btn = document.getElementById('startBtn');
        const box = document.getElementById('display');
        const statusBar = document.getElementById('status-bar');

        // Lógica de Memória (Baseline)
        function getHistorico() {
            return JSON.parse(localStorage.getItem('nq_logs') || "[]");
        }

        function salvarTeste(ms) {
            let logs = getHistorico();
            logs.push(ms);
            if (logs.length > 10) logs.shift(); // Mantém apenas os últimos 10
            localStorage.setItem('nq_logs', JSON.stringify(logs));
            atualizarStatus();
        }

        function atualizarStatus() {
            const logs = getHistorico();
            if (logs.length < 3) {
                statusBar.innerHTML = `MODO: CALIBRAÇÃO (${logs.length}/3)<br>Continue testando para criar seu perfil.`;
                box.className = 'calibrando';
                return null;
            }
            const media = logs.reduce((a, b) => a + b) / logs.length;
            statusBar.innerHTML = `MODO: OPERACIONAL | SUA MÉDIA: ${media.toFixed(0)}ms<br>Monitorando desvios de performance.`;
            box.className = '';
            return media;
        }

        function prepararTeste() {
            btn.style.display = 'none';
            stim.style.display = 'block';
            stim.style.backgroundColor = '#111';
            res.innerHTML = "FOCO NO CÍRCULO...";
            sensorAtivo = false;
            let tempoEspera = 1500 + Math.random() * 3000;
            clearTimeout(waitTimeout);
            waitTimeout = setTimeout(() => {
                stim.style.backgroundColor = '#00ff41';
                startTime = performance.now();
                sensorAtivo = true;
            }, tempoEspera);
        }

        stim.onclick = () => {
            if (!sensorAtivo) {
                res.innerHTML = "ERRO: PRECOCE";
                clearTimeout(waitTimeout);
                resetarInterface("REPETIR");
                return;
            }
            const latencia = performance.now() - startTime;
            salvarTeste(latencia);
            const mediaAnterior = atualizarStatus();

            res.innerHTML = `REAÇÃO: <b>${latencia.toFixed(0)}ms</b>`;
            
            // Lógica de Comparação Individual
            if (mediaAnterior && latencia > (mediaAnterior * 1.25)) {
                res.innerHTML += "<br><small>ALERTA: QUEDA DE PERFORMANCE</small>";
                box.classList.add('alerta');
            } else if (latencia < 150) {
                res.innerHTML += "<br><small>ERRO: DADO INVÁLIDO</small>";
            } else {
                res.innerHTML += "<br><small>ESTADO NOMINAL</small>";
            }

            resetarInterface("NOVO TESTE");
            sensorAtivo = false;
        };

        function resetarInterface(txt) {
            stim.style.display = 'none';
            btn.style.display = 'block';
            btn.innerText = txt;
        }

        // Inicializa o HUD
        atualizarStatus();
    </script>
</body>
</html>
