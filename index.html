<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL QUEST - MATRIX v1.0</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; user-select: none; }
        #game-container { position: relative; border: 2px solid #00ff41; border-radius: 10px; width: 340px; height: 340px; box-shadow: 0 0 20px #00ff41; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; background: rgba(0,20,0,0.2); }
        #target { width: 60px; height: 60px; border-radius: 50%; position: absolute; cursor: pointer; display: none; transition: transform 0.1s; }
        .btn-start { background: #00ff41; color: #000; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; font-family: inherit; z-index: 10; }
        #hud-info { margin-top: 15px; text-align: center; font-size: 0.8rem; }
        #chart-area { width: 340px; height: 120px; margin-top: 10px; }
        .msg { font-size: 1.1em; text-align: center; padding: 20px; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="msg-screen" class="msg">SISTEMA INICIALIZADO<br><small>Selecione o Protocolo</small></div>
        <div id="target"></div>
        <button id="mainBtn" class="btn-start" onclick="iniciarSequencia()">INICIAR BATERIA</button>
    </div>

    <div id="chart-area"><canvas id="perfChart"></canvas></div>
    
    <div id="hud-info">
        PROTOCOLO: <span id="protocolo-name">STANDBY</span><br>
        <small id="stat-line">Aguardando autorização do Knight...</small>
    </div>

    <script>
        let stage = 0;
        let results = [];
        let startTime;
        const target = document.getElementById('target');
        const msg = document.getElementById('msg-screen');
        const btn = document.getElementById('mainBtn');
        const protoName = document.getElementById('protocolo-name');

        const protocolos = [
            { name: "REACTION", color: "#00ff41", desc: "Clique no VERDE rápido" },
            { name: "CHASE", color: "#00e5ff", desc: "Persiga o alvo na tela" },
            { name: "FILTER", color: "#ffea00", desc: "Apenas VERDE! Ignore Vermelho" },
            { name: "FOCUS", color: "#ff00ff", desc: "Clique no 3º pulso exato" }
        ];

        function iniciarSequencia() {
            stage = 0;
            results = [];
            btn.style.display = 'none';
            proximoProtocolo();
        }

        function proximoProtocolo() {
            if (stage >= 4) {
                finalizarBateria();
                return;
            }
            const p = protocolos[stage];
            protoName.innerText = p.name;
            msg.innerHTML = `PROTOCOLO ${stage + 1}<br><b>${p.name}</b><br><small>${p.desc}</small>`;
            
            setTimeout(() => {
                msg.innerHTML = "";
                executarTeste(p.name);
            }, 2000);
        }

        function executarTeste(tipo) {
            target.style.display = 'block';
            target.style.transform = "scale(1)";
            
            if (tipo === "REACTION") {
                posicionarCentro();
                target.style.backgroundColor = "#111";
                setTimeout(() => {
                    target.style.backgroundColor = "#00ff41";
                    startTime = performance.now();
                }, 1000 + Math.random() * 2000);
            } 
            else if (tipo === "CHASE") {
                posicionarAleatorio();
                target.style.backgroundColor = "#00e5ff";
                startTime = performance.now();
            }
            else if (tipo === "FILTER") {
                posicionarCentro();
                let isRed = Math.random() > 0.5;
                target.style.backgroundColor = isRed ? "red" : "#00ff41";
                startTime = performance.now();
                if (isRed) {
                    setTimeout(() => { if(target.style.backgroundColor === "red") registrar(800, true); }, 1500);
                }
            }
            else if (tipo === "FOCUS") {
                posicionarCentro();
                target.style.backgroundColor = "#111";
                let pulsos = 0;
                let interval = setInterval(() => {
                    pulsos++;
                    target.style.transform = "scale(1.2)";
                    setTimeout(() => target.style.transform = "scale(1)", 100);
                    if (pulsos === 3) {
                        target.style.backgroundColor = "#ff00ff";
                        startTime = performance.now();
                        clearInterval(interval);
                    }
                }, 600);
            }
        }

        target.onclick = () => {
            if (target.style.backgroundColor === "red") {
                registrar(1000, false); // Penalidade por erro
                return;
            }
            if (target.style.backgroundColor === "#111") return;
            
            const duracao = performance.now() - startTime;
            registrar(duracao, true);
        };

        function registrar(ms, sucesso) {
            target.style.display = 'none';
            results.push(ms);
            stage++;
            proximoProtocolo();
        }

        function posicionarCentro() {
            target.style.top = "140px";
            target.style.left = "140px";
        }

        function posicionarAleatorio() {
            target.style.top = Math.random() * 250 + "px";
            target.style.left = Math.random() * 250 + "px";
        }

        function finalizarBateria() {
            msg.innerHTML = "BATERIA CONCLUÍDA<br>Analisando Sinais...";
            const media = results.reduce((a,b) => a+b) / 4;
            setTimeout(() => {
                msg.innerHTML = `SCORE NEURAL: ${media.toFixed(0)}ms<br><small>Baseline Atualizada</small>`;
                btn.style.display = 'block';
                btn.innerText = "REPETIR BATERIA";
                salvarEPlotar(results);
            }, 1500);
        }

        // Gráfico simplificado para os 4 tipos
        function salvarEPlotar(res) {
            const ctx = document.getElementById('perfChart').getContext('2d');
            if(window.myChart) window.myChart.destroy();
            window.myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['REAC', 'CHASE', 'FILT', 'FOC'],
                    datasets: [{ label: 'ms', data: res, backgroundColor: ['#00ff41', '#00e5ff', '#ffea00', '#ff00ff'] }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }
    </script>
</body>
</html>
